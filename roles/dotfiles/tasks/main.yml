- name: Clone dotfiles repo
  git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_dest }}"
    version: main
    update: false
  register: dotfiles_clone

- name: Ensure parent config directories exist
  file:
    path: "{{ item.dest | dirname }}"
    state: directory
    mode: '0755'
  loop: "{{ dotfiles_links }}"

- name: Symlink dotfiles
  file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ dotfiles_links }}"

- name: Clear neovim lazy plugins dir for clean install
  file:
    path: "{{ ansible_user_dir }}/.local/share/nvim/lazy"
    state: absent
  when: dotfiles_clone.changed

- name: Bootstrap neovim plugins
  command: nvim --headless "+Lazy! restore" +qa
  changed_when: false
  timeout: 120
  when: dotfiles_clone.changed
