- name: Deploy terminal theme
  copy:
    src: terminal-theme.sh
    dest: "{{ ansible_user_dir }}/.config/terminal-theme.sh"
    mode: '0644'

- name: Source terminal theme from bashrc
  blockinfile:
    path: "{{ ansible_user_dir }}/.bashrc"
    create: true
    marker: "# {mark} ANSIBLE MANAGED: homelab config"
    block: |
      source ~/.config/terminal-theme.sh

- name: Deploy ttyd-agave binary
  copy:
    src: ttyd-agave
    dest: /usr/local/bin/ttyd-agave
    mode: '0755'
  become: true
  notify: restart ttyd

- name: Deploy ttyd start script
  template:
    src: ttyd-start.sh.j2
    dest: "{{ ansible_user_dir }}/.local/bin/ttyd-start.sh"
    mode: '0755'
  notify: restart ttyd

- name: Ensure user systemd directory exists
  file:
    path: "{{ ansible_user_dir }}/.config/systemd/user"
    state: directory
    mode: '0755'

- name: Deploy ttyd user service
  template:
    src: ttyd.service.j2
    dest: "{{ ansible_user_dir }}/.config/systemd/user/ttyd.service"
    mode: '0644'
  notify:
    - reload user systemd
    - restart ttyd

- name: Enable linger for user service autostart at boot
  command: loginctl enable-linger {{ ansible_user }}
  become: true
  args:
    creates: "/var/lib/systemd/linger/{{ ansible_user }}"

- name: Enable and start ttyd user service
  systemd:
    name: ttyd
    state: started
    enabled: true
    scope: user
    daemon_reload: true
