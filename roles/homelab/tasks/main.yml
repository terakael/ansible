- name: Install nginx
  community.general.pacman:
    name: nginx
    state: present
  become: true

- name: Ensure nginx conf.d directory exists
  file:
    path: /etc/nginx/conf.d
    state: directory
    mode: '0755'
  become: true

- name: Enable conf.d includes in nginx.conf
  lineinfile:
    path: /etc/nginx/nginx.conf
    regexp: '^\s*#?\s*include\s+/etc/nginx/conf\.d/\*\.conf;'
    line: '    include /etc/nginx/conf.d/*.conf;'
    insertafter: 'http \{'
  become: true
  notify: restart nginx

- name: Deploy nginx ttyd config
  template:
    src: nginx-ttyd.conf.j2
    dest: /etc/nginx/conf.d/ttyd.conf
    mode: '0644'
  become: true
  notify: restart nginx

- name: Enable and start nginx
  service:
    name: nginx
    state: started
    enabled: true
  become: true

- name: Deploy ttyd start script
  template:
    src: ttyd-start.sh.j2
    dest: "{{ ansible_user_dir }}/.local/bin/ttyd-start.sh"
    mode: '0755'
  notify: restart ttyd

- name: Ensure user systemd directory exists
  file:
    path: "{{ ansible_user_dir }}/.config/systemd/user"
    state: directory
    mode: '0755'

- name: Deploy ttyd user service
  template:
    src: ttyd.service.j2
    dest: "{{ ansible_user_dir }}/.config/systemd/user/ttyd.service"
    mode: '0644'
  notify:
    - reload user systemd
    - restart ttyd

- name: Enable linger for user service autostart at boot
  command: loginctl enable-linger {{ ansible_user }}
  become: true
  args:
    creates: "/var/lib/systemd/linger/{{ ansible_user }}"

- name: Enable and start ttyd user service
  systemd:
    name: ttyd
    state: started
    enabled: true
    scope: user
    daemon_reload: true
