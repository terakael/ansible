---
- name: Install rustup
  community.general.pacman:
    name: rustup
    state: present
  become: true

- name: Install stable toolchain and set as default
  command: rustup default stable
  args:
    creates: "{{ ansible_user_dir }}/.rustup/toolchains"

- name: Install rust-analyzer component
  command: rustup component add rust-analyzer
  changed_when: false

- name: Add cargo bin to PATH
  blockinfile:
    path: "{{ ansible_user_dir }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED - cargo PATH"
    block: |
      export PATH="$HOME/.cargo/bin:$PATH"
    create: true

- name: Create cargo target directory on churn drive
  file:
    path: "{{ cargo_target_dir }}"
    state: directory
    mode: "0755"
  when: cargo_target_dir is defined

- name: Configure cargo to use churn drive for build artifacts
  blockinfile:
    path: "{{ ansible_user_dir }}/.cargo/config.toml"
    marker: "# {mark} ANSIBLE MANAGED - cargo target dir"
    block: |
      [build]
      target-dir = "{{ cargo_target_dir }}"
    create: true
  when: cargo_target_dir is defined
